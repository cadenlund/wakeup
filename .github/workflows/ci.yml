name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # No `services:` block — repository tests own their own infra via
    # testcontainers-go (postgres / redis / minio / livekit), which uses
    # the runner's host Docker. Adding GA services on top would just be a
    # second postgres on :5432 fighting testcontainers for the port.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # conform validates the whole PR commit range, needs full history

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod         # auto-derive Go version from the module directive
          cache: true
          cache-dependency-path: apps/backend/go.sum   # caches GOMODCACHE + ~/.cache/go-build keyed on this file

      - uses: extractions/setup-just@v2

      # Cache the Go-installed binaries (swag, goose) across runs. Bump the key
      # by editing this workflow file when adding a new tool.
      - name: Cache Go-installed tools
        id: cache-go-bin
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bin-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install tools (cache miss)
        if: steps.cache-go-bin.outputs.cache-hit != 'true'
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          go install github.com/pressly/goose/v3/cmd/goose@v3.27.1

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: apps/backend

      - name: Test
        run: just test-cover

      - name: Generate docs
        run: just gen-docs-check

      - name: §12.7 WebSocket test matrix coverage
        run: scripts/ci/check-ws-tests.sh

      - name: §12.5 Handler test coverage matches swagger failures
        run: scripts/ci/check-handler-tests.sh

      - name: Conform
        uses: siderolabs/conform@v0.1.0-alpha.30
