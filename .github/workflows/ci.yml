name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
      redis:
        image: redis:7
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true                # caches GOMODCACHE + ~/.cache/go-build keyed on go.sum

      - uses: extractions/setup-just@v2

      # Cache the Go-installed binaries (swag, goose) across runs. Bump the key
      # by editing this workflow file when adding a new tool.
      - name: Cache Go-installed tools
        id: cache-go-bin
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bin-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install tools (cache miss)
        if: steps.cache-go-bin.outputs.cache-hit != 'true'
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        run: |
          # goose errors out on an empty migrations dir; skip while there are none.
          if compgen -G 'migrations/*.sql' > /dev/null; then
            just migrate-up
          else
            echo "No migrations yet — skipping goose."
          fi
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: apps/backend

      - name: Test
        run: just test-cover

      - name: Generate docs
        run: just gen-docs

      - name: Conform
        uses: siderolabs/conform@v0.1.0-alpha.30
