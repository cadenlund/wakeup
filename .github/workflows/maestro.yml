name: Maestro

# Phase-suite Maestro flows run end-to-end on a real Android
# emulator against a real backend stack. Heavyweight (build backend
# + dev client + boot emulator + run flows), so it's a separate
# workflow that only triggers on PRs and main pushes — not the
# tight verify loop.
#
# Per WAKEUPEXPO §12.1 / §16 3.5: each end-of-phase suite is the
# gate for that phase. Phase-3 ships first; later phases extend the
# matrix as their suites land.

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/.maestro/**"
      - "apps/mobile/app/**"
      - "apps/mobile/components/**"
      - "apps/mobile/lib/**"
      - "apps/mobile/package.json"
      - "apps/mobile/app.json"
      - "apps/backend/**"
      - "migrations/**"
      - "docker-compose.yml"
      - ".github/workflows/maestro.yml"
  pull_request:
    paths:
      - "apps/mobile/.maestro/**"
      - "apps/mobile/app/**"
      - "apps/mobile/components/**"
      - "apps/mobile/lib/**"
      - "apps/mobile/package.json"
      - "apps/mobile/app.json"
      - "apps/backend/**"
      - "migrations/**"
      - "docker-compose.yml"
      - ".github/workflows/maestro.yml"

permissions:
  contents: read

concurrency:
  group: maestro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase-3-auth:
    name: Phase 3 — auth + onboarding suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # ENV=test flips buildMailer / buildPusher / buildSentry into
      # noop mode when their integration creds (RESEND_API_KEY,
      # EXPO_ACCESS_TOKEN, SENTRY_DSN) are blank — so the suite never
      # sends a real email, push, or Sentry event no matter what the
      # flow exercises.
      ENV: test
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://wakeup:wakeup@localhost:5432/wakeup?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: wakeup
      S3_FORCE_PATH_STYLE: "true"
      LOG_LEVEL: info
      SESSION_SECRET: ci-only-not-secret-32bytes-long-padding

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Backend deps + build -----------------------------------
      - name: Stand up backend stack (postgres + redis + minio)
        run: |
          docker compose up -d --wait postgres redis minio
          # Bootstrap the bucket the avatar/attachment paths write into.
          docker exec wakeup-minio-1 mc alias set local \
            http://localhost:9000 minioadmin minioadmin
          docker exec wakeup-minio-1 mc mb --ignore-existing local/wakeup

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Run goose migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          goose -dir migrations postgres "$DATABASE_URL" up

      - name: Start backend
        # Background launch + 10s settle so the emulator step doesn't
        # race the http listener.
        run: |
          cd apps/backend
          go build -o /tmp/wakeup-server ./cmd/server
          /tmp/wakeup-server &> /tmp/backend.log &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 30); do
            if curl -sS -o /dev/null http://localhost:8080/v1/healthz; then
              echo "backend up"
              exit 0
            fi
            sleep 1
          done
          echo "backend never came up"; cat /tmp/backend.log; exit 1

      # --- Mobile deps + dev-client APK ---------------------------
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install JS deps
        working-directory: apps/mobile
        run: bun install --frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}

      - name: Prebuild + assemble Android dev client APK
        working-directory: apps/mobile
        env:
          # Android emulator reaches host loopback at 10.0.2.2.
          EXPO_PUBLIC_API_BASE_URL: http://10.0.2.2:8080
          EXPO_PUBLIC_WS_BASE_URL: ws://10.0.2.2:8080
          EXPO_PUBLIC_ENV: development
          # Skip the Sentry source-map upload step; CI doesn't have a
          # SENTRY_AUTH_TOKEN and Sentry's plugin would fail the build.
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          bunx expo prebuild --clean --platform android --no-install
          cd android
          ./gradlew :app:assembleDebug --no-daemon

      # --- Maestro CLI --------------------------------------------
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # --- Android emulator + flow run ----------------------------
      - name: Run phase-3 Maestro suite on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # Headless so it works on the runner; disable boot animation
          # for a faster start.
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -accel on -no-snapshot
          # Pre-install the dev client APK we built above, then drop
          # the same backend the iOS sim reaches into adb-reverse so
          # localhost in the app maps to the runner's 8080.
          script: |
            adb install -r apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            adb reverse tcp:8080 tcp:8080
            adb reverse tcp:8081 tcp:8081
            cd apps/mobile
            bunx expo start --no-dev --minify --port 8081 &
            METRO_PID=$!
            # Give Metro a moment to come up before the flow opens
            # the deep link.
            sleep 20
            maestro --device emulator-5554 test \
              .maestro/flows/phase-3-auth.yaml
            kill $METRO_PID || true

      # --- Artifacts ----------------------------------------------
      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-screenshots
          path: |
            apps/mobile/.maestro/screenshots/**
            ~/.maestro/tests/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi
          docker compose down -v --remove-orphans || true
