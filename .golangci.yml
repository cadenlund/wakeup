version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck   # subsumes gosimple + unused in v2
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - revive
    - sqlclosecheck
    - rowserrcheck
  settings:
    errorlint:
      asserts: true
      comparison: true

formatters:
  enable:
    - gofmt
    - goimports
