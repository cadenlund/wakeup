# Phase 3.3 — forgot-password screen.
#
# The endpoint is always-204 (per WAKEUP §6.2 — the backend never
# leaks whether an email is registered) so the assertion is on the
# success copy the screen renders, not on a server response.
appId: app.wakeup.client
---
- launchApp:
    clearState: true
- assertVisible: 'Sign in'
- tapOn:
    id: login-forgot
- extendedWaitUntil:
    visible:
      id: forgot-email
    timeout: 10000
- tapOn:
    id: forgot-email
- inputText: 'someone@example.com'
# Don't hide the keyboard before tapping submit. The
# KeyboardAvoidingView shifts the layout up so submit stays in
# view while the keyboard is up; the extra hide pass races
# against React's debounced "submit-enabled" recomputation and
# leaves Maestro looking for an enabled button before the prop
# has flipped.
- assertVisible:
    id: forgot-email
    text: 'someone@example.com'
- takeScreenshot: auth-forgot-form
- tapOn:
    id: forgot-submit
- extendedWaitUntil:
    visible: 'Check your email'
    timeout: 10000
- takeScreenshot: auth-forgot-success
- tapOn:
    id: forgot-back
- extendedWaitUntil:
    visible: 'Welcome back. We saved your spot.'
    timeout: 10000
