appId: com.anonymous.mobile
---
# Phase 3.1 — login screen renders correctly and the form is wired.
# Doesn't actually submit because no seeded test user exists yet
# (lands with backend test fixtures in a later phase).
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'
- assertVisible: 'Sign in to keep up with your friends.'
- assertVisible: 'Username or email'
- assertVisible: 'Password'
# Submit button is disabled with empty fields.
- tapOn:
    id: 'login-identifier'
- inputText: 'someone@example.com'
- tapOn:
    id: 'login-password'
- inputText: 'placeholder'
- assertVisible: 'Sign in'
- takeScreenshot: auth-login
# Cross-link to register works.
- tapOn:
    id: 'login-go-register'
- assertVisible: 'Create account'
