# to register via the cross-link.
- assertVisible: 'Sign in'
- tapOn: 'Create account'
- assertVisible: 'Create account'
- assertVisible: 'Display name'
- assertVisible: 'Username'
- assertVisible: 'Email'
- assertVisible: 'Password'
- tapOn: 'Display name'
- inputText: 'Test User'
- tapOn: 'Username'
- inputText: 'testuser'
- tapOn: 'Email'
- inputText: 'test@example.com'
- tapOn: 'Password'
- inputText: 'placeholder1'
- takeScreenshot: auth-register
- tapOn: 'Sign in'
- assertVisible: 'Sign in'
