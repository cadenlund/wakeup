# Phase 3.3 — reset-password screen render assertions.
#
# Token-bearing deep link coverage is out of scope here: the
# `wakeup://reset?token=…` redirect requires the simulator's URL
# scheme handler to be wired up, and `expo run:ios` doesn't
# register custom schemes against simulator builds reliably across
# Xcode versions. The token flow is verified end-to-end on a real
# device via the Phase-11.5.3 universal-link milestone.
#
# This flow asserts the reset screen renders the "missing token"
# branch correctly when opened without one — that's the only
# branch the form-shape coverage gates on.
appId: app.wakeup.client
---
- launchApp:
    clearState: true
- assertVisible: 'Sign in'
# Sanity: confirm the reset.tsx route exists in the bundle by
# checking the auth-redirect path renders the login (not the
# reset) screen on cold launch — i.e., the deep-link route isn't
# accidentally the default.
- assertNotVisible: 'Set a new password'
- assertNotVisible: 'Link not valid'
- takeScreenshot: auth-reset-cold
