# Phase 6.5 — long-press message context menu.
#
# The menu opens from a long-press on a message bubble inside a
# conversation thread. A single-account fresh run has no
# conversations and no messages, so the populated long-press →
# Copy / React / Report / Delete path needs a multi-user fixture.
# Matches the conversation-thread / composer / read-receipts
# pattern: mount-only smoke proving the new <MessageContextMenu> +
# useDeleteMessage subgraph (and the expo-clipboard import) doesn't
# crash the bundle at load time.
#
# What this flow asserts:
#   1. Cold launch → register-fresh → skip onboarding → land on
#      (tabs) Chats tab with the empty state.
#   2. The chats screen renders cleanly with the new context-menu
#      + delete-message + expo-clipboard imports pulled into the
#      bundle. The populated long-press path lands when the
#      multi-user fixture work for §5+ flows finalises.
appId: app.wakeup.client
---
- stopApp
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow: ./_shared/register-fresh.yaml

# Skip onboarding to fast-path into (tabs).
- extendedWaitUntil:
    visible: 'Just your friends'
    timeout: 10000
- tapOn: 'Skip'

# Land on the Chats tab. Mount-without-crash proves the new
# context-menu + delete-message + clipboard subgraph doesn't
# break the bundle.
- extendedWaitUntil:
    visible: 'No conversations yet'
    timeout: 10000
- assertVisible: 'No conversations yet'
- takeScreenshot: message-context-menu-chats-empty
# End on a hard assertion — takeScreenshot doesn't check anything
# on its own, so without this final guard a post-screenshot
# regression would slip past CI silently.
- assertVisible: 'No conversations yet'
