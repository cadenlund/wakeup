# Local-dev stack for the Wakeup backend.
# Bring up with `just up` (docker-compose up -d). Postgres + MinIO persist data
# under .docker-data/; Redis and LiveKit (--dev mode) are ephemeral.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wakeup
      POSTGRES_PASSWORD: wakeup
      POSTGRES_DB: wakeup
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakeup -d wakeup"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - ./.docker-data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    # Self-hosted LiveKit (per WAKEUP.md §10.3). --dev mode for local testing.
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--dev", "--bind=0.0.0.0"]
    environment:
      LIVEKIT_KEYS: "devkey: devsecretdevsecretdevsecret"
    ports:
      - "7880:7880"                       # signaling (WebSocket)
      - "7881:7881/tcp"                   # TCP fallback for media
      - "7882:7882/udp"                   # embedded TURN
      - "50000-50100:50000-50100/udp"     # media (RTP)
