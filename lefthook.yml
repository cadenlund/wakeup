pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    lint:
      glob: "*.go"
      run: cd apps/backend && golangci-lint run ./...
    test:
      glob: "*.go"
      # -short skips a couple of integration tests (notably the
      # LiveKit e2e one) that hit public STUN servers and flake under
      # the hook's heavy parallel load. CI runs without -short so
      # full coverage still happens before merge.
      run: cd apps/backend && go test -race -count=1 -short ./...
    # Mobile mirrors the backend's pre-commit shape: format-on-stage,
    # lint, type-check. Component tests are NOT run pre-commit — the
    # suite is small enough that GH Actions (.github/workflows/mobile.yml)
    # catches them, and pre-commit must stay fast or developers bypass
    # it. See WAKEUPEXPO.md §13.5.
    mobile-format:
      glob: "apps/mobile/**/*.{ts,tsx,js,jsx,json,md}"
      run: cd apps/mobile && bunx prettier --write --ignore-path .prettierignore {staged_files}
      stage_fixed: true
    mobile-lint:
      glob: "apps/mobile/**/*.{ts,tsx,js,jsx}"
      run: cd apps/mobile && bunx eslint --max-warnings 0 {staged_files}
    # Type-check runs over the whole package, not just staged files —
    # tsc can't safely isolate to one file (a change in foo.ts can
    # break bar.ts which isn't staged). Fast enough on the current
    # tree; revisit if it becomes a bottleneck.
    mobile-tsc:
      glob: "apps/mobile/**/*.{ts,tsx}"
      run: cd apps/mobile && bunx tsc --noEmit

commit-msg:
  commands:
    conform:
      run: conform enforce --commit-msg-file {1}
